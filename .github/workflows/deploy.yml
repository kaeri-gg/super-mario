name: Deploy to GitHub Pages

# Builds the Godot web export and publishes it to GitHub Pages on every
# push to main. Lets you keep release/ permanently gitignored — the build
# output never touches the main branch's history.
#
# One-time setup needed in the GitHub repo:
#   Settings → Pages → Source: "GitHub Actions"
#   Settings → Secrets and variables → Actions, add:
#     ITCH_IO_API_KEY  (butler API key from https://itch.io/user/settings/api-keys)
#     ITCH_IO_USERNAME (your itch.io account name)

on:
  push:
    branches: [main]
    tags: ['v*']       # v1.0.0, v1.2.3, etc. trigger itch.io publish
  workflow_dispatch:    # also allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue parallel deploys; cancel in-flight if a newer push lands.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.6"
  GODOT_STATUS: "stable"
  EXPORT_PRESET: "Web"
  ITCH_IO_GAME_SLUG: "greedy-knight"
  ITCH_IO_CHANNEL: "html5"

jobs:
  build:
    name: Build web export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary and templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}

      - name: Install Godot (cache miss only)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          GODOT_FULL="${GODOT_VERSION}-${GODOT_STATUS}"
          mkdir -p ~/godot

          # Editor binary
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_FULL}/Godot_v${GODOT_FULL}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_FULL}_linux.x86_64.zip" -d ~/godot
          mv ~/godot/Godot_v${GODOT_FULL}_linux.x86_64 ~/godot/godot
          chmod +x ~/godot/godot
          rm "Godot_v${GODOT_FULL}_linux.x86_64.zip"

          # Export templates (Godot expects them under export_templates/<version>.<status>/)
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_FULL}/Godot_v${GODOT_FULL}_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}
          unzip -q "Godot_v${GODOT_FULL}_export_templates.tpz"
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}/
          rm -rf templates "Godot_v${GODOT_FULL}_export_templates.tpz"

      - name: Add Godot to PATH
        run: echo "$HOME/godot" >> "$GITHUB_PATH"

      - name: Import resources
        # Headless import scans the project. The first pass usually errors
        # out partway through; running twice gets a clean cache.
        run: |
          godot --headless --import 2>&1 | tail -20 || true
          godot --headless --import 2>&1 | tail -20 || true

      - name: Export web build
        run: |
          set -e
          mkdir -p release
          godot --headless --export-release "$EXPORT_PRESET" release/index.html
          echo "--- export contents ---"
          ls -lh release/
          echo "--- total size ---"
          du -sh release/

      - name: Upload web export artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: release/
          retention-days: 1

      - name: Stage Pages artifact
        # Mirror the existing deploy URL structure so the game stays at
        # https://<user>.github.io/<repo>/release/. A tiny redirect at the
        # root sends bare /<repo>/ visits into the game.
        run: |
          mkdir -p _site/release
          cp -r release/* _site/release/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <title>game-development</title>
          <meta http-equiv="refresh" content="0; url=release/">
          <link rel="canonical" href="release/">
          <p>Loading… <a href="release/">click here</a> if nothing happens.</p>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  itch-publish:
    name: Publish to itch.io
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Download web export
        uses: actions/download-artifact@v4
        with:
          name: web-export
          path: ${{ env.ITCH_IO_CHANNEL }}

      - name: Push to itch.io
        uses: Ayowel/butler-to-itch@v1.3.0
        with:
          butler_key: ${{ secrets.ITCH_IO_API_KEY }}
          itch_user: ${{ secrets.ITCH_IO_USERNAME }}
          itch_game: ${{ env.ITCH_IO_GAME_SLUG }}
          version: ${{ github.ref_name }}
          files: |
            ${{ env.ITCH_IO_CHANNEL }} ${{ env.ITCH_IO_CHANNEL }}/
